<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Art Gallery — AI Generated Masterpieces</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --text-primary: #f1f1f5;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --accent: #7c6cf0;
            --accent-glow: rgba(124, 108, 240, 0.15);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-hover: 0 16px 48px rgba(0, 0, 0, 0.7);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(124, 108, 240, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(124, 108, 240, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(124, 108, 240, 0.02) 0%, transparent 40%);
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8b7cf0;
        }

        /* ===== LAYOUT ===== */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 2rem 2.5rem 4rem;
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 1.5rem 0 2.5rem;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1.5rem;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
        }

        .logo {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .logo h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #f1f1f5 0%, #a0a0b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .logo .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 400;
            -webkit-text-fill-color: var(--text-secondary);
        }

        .logo .subtitle span {
            color: var(--accent);
            -webkit-text-fill-color: var(--accent);
        }

        .header-stats {
            display: flex;
            gap: 2.5rem;
            align-items: center;
            padding: 0.5rem 1.5rem;
            background: var(--bg-card);
            border-radius: 100px;
            border: 1px solid var(--border-subtle);
            backdrop-filter: blur(10px);
        }

        .header-stats .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .header-stats .stat-item strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .header-stats .stat-divider {
            width: 1px;
            height: 24px;
            background: var(--border-subtle);
        }

        /* ===== CONTROLS ===== */
        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            padding: 1.25rem 1.5rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            margin-bottom: 2.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            flex: 1;
            min-width: 220px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 3rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: var(--transition);
            font-family: inherit;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .search-box .icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.6rem 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.8rem;
            font-weight: 500;
            font-family: inherit;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 4px 16px rgba(124, 108, 240, 0.3);
        }

        .filter-btn.active:hover {
            box-shadow: 0 6px 24px rgba(124, 108, 240, 0.4);
            transform: translateY(-1px);
        }

        /* ===== GALLERY GRID ===== */
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 0 0.25rem;
        }

        .gallery-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .gallery-header .count {
            font-size: 0.8rem;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            border: 1px solid var(--border-subtle);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* ===== IMAGE CARD ===== */
        .image-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-subtle);
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            group: true;
        }

        .image-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            padding: 1px;
            background: linear-gradient(135deg, rgba(124, 108, 240, 0.2), transparent, rgba(124, 108, 240, 0.1));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: var(--transition);
        }

        .image-card:hover::before {
            opacity: 1;
        }

        .image-card:hover {
            transform: translateY(-8px);
            border-color: rgba(124, 108, 240, 0.2);
            box-shadow: var(--shadow-hover);
            background: var(--bg-card-hover);
        }

        .image-card .image-wrapper {
            position: relative;
            overflow: hidden;
            background: #0d0d15;
        }

        .image-card .image-wrapper img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .image-card:hover .image-wrapper img {
            transform: scale(1.03);
        }

        .image-card .image-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.6) 0%, transparent 50%);
            opacity: 0;
            transition: var(--transition);
            display: flex;
            align-items: flex-end;
            padding: 1.5rem;
        }

        .image-card:hover .image-overlay {
            opacity: 1;
        }

        .image-card .image-overlay .view-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            letter-spacing: 0.04em;
        }

        .image-card:hover .image-overlay .view-btn {
            background: var(--accent);
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .image-card .info {
            padding: 1.25rem 1.25rem 1rem;
        }

        .image-card .prompt {
            font-size: 0.9rem;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        .image-card .prompt::before {
            content: '"';
            color: var(--accent);
            opacity: 0.5;
        }

        .image-card .prompt::after {
            content: '"';
            color: var(--accent);
            opacity: 0.5;
        }

        .image-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-subtle);
        }

        .image-card .meta .tags {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .image-card .meta .tag {
            background: rgba(124, 108, 240, 0.1);
            color: var(--accent);
            padding: 0.15rem 0.6rem;
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            border: 1px solid rgba(124, 108, 240, 0.1);
        }

        .image-card .meta .time {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* ===== LOADING ===== */
        .loading {
            display: none;
            text-align: center;
            padding: 5rem 2rem;
        }

        .loading.active {
            display: block;
        }

        .loading .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        /* ===== EMPTY STATE ===== */
        .empty {
            text-align: center;
            padding: 5rem 2rem;
            display: none;
        }

        .empty .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }

        .empty h3 {
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .empty p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 2rem;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-close {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            z-index: 1001;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
            color: white;
        }

        .modal-content {
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            animation: slideUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-content .image-container {
            position: relative;
            background: #0d0d15;
            display: flex;
            align-items: center;
            justify-content: center;
            max-height: 60vh;
            overflow: hidden;
        }

        .modal-content .image-container img {
            width: 100%;
            height: auto;
            max-height: 60vh;
            object-fit: contain;
            display: block;
        }

        .modal-content .details {
            padding: 2rem 2.5rem;
            overflow-y: auto;
            max-height: 40vh;
        }

        .modal-content .details .prompt {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        .modal-content .details .prompt::before {
            content: '"';
            color: var(--accent);
            font-size: 1.4rem;
            opacity: 0.6;
        }

        .modal-content .details .prompt::after {
            content: '"';
            color: var(--accent);
            font-size: 1.4rem;
            opacity: 0.6;
        }

        .modal-content .details .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
        }

        .modal-content .details .meta-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
        }

        .modal-content .details .meta-item label {
            font-size: 0.65rem;
            color: var(--text-muted);
            display: block;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .modal-content .details .meta-item value {
            font-size: 0.9rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .container {
                padding: 1.5rem;
            }
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            header {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }

            .logo h1 {
                font-size: 1.8rem;
            }

            .header-stats {
                padding: 0.75rem 1rem;
                border-radius: var(--radius-md);
                justify-content: space-around;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .header-stats .stat-divider {
                display: none;
            }

            .controls {
                flex-direction: column;
                padding: 1rem;
            }

            .search-box {
                width: 100%;
            }

            .filter-group {
                width: 100%;
                justify-content: center;
            }

            .filter-btn {
                flex: 1;
                justify-content: center;
                font-size: 0.7rem;
                padding: 0.5rem 0.8rem;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 1rem;
            }

            .modal {
                padding: 1rem;
            }

            .modal-content {
                max-height: 95vh;
            }

            .modal-content .details {
                padding: 1.25rem;
            }

            .modal-content .details .meta-grid {
                grid-template-columns: 1fr 1fr;
            }

            .modal-close {
                top: 1rem;
                right: 1rem;
                width: 2.5rem;
                height: 2.5rem;
                font-size: 1.2rem;
            }

            .gallery-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .gallery {
                grid-template-columns: 1fr 1fr;
                gap: 0.75rem;
            }

            .image-card .info {
                padding: 0.75rem;
            }

            .image-card .prompt {
                font-size: 0.8rem;
                -webkit-line-clamp: 1;
            }

            .image-card .meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.3rem;
                padding-top: 0.5rem;
            }

            .header-stats .stat-item {
                font-size: 0.7rem;
            }

            .modal-content .details .meta-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== ANIMATIONS ===== */
        .image-card {
            animation: cardAppear 0.5s ease backwards;
        }

        .image-card:nth-child(1) { animation-delay: 0.05s; }
        .image-card:nth-child(2) { animation-delay: 0.1s; }
        .image-card:nth-child(3) { animation-delay: 0.15s; }
        .image-card:nth-child(4) { animation-delay: 0.2s; }
        .image-card:nth-child(5) { animation-delay: 0.25s; }
        .image-card:nth-child(6) { animation-delay: 0.3s; }
        .image-card:nth-child(7) { animation-delay: 0.35s; }
        .image-card:nth-child(8) { animation-delay: 0.4s; }
        .image-card:nth-child(9) { animation-delay: 0.45s; }
        .image-card:nth-child(10) { animation-delay: 0.5s; }
        .image-card:nth-child(11) { animation-delay: 0.55s; }
        .image-card:nth-child(12) { animation-delay: 0.6s; }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== SMOOTH SCROLL ===== */
        html {
            scroll-behavior: smooth;
        }

        /* ===== SELECTION ===== */
        ::selection {
            background: var(--accent);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <div class="logo">
                <h1>✦ Art Gallery</h1>
                <div class="subtitle">AI Generated <span>Masterpieces</span></div>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    🖼️ <strong id="totalImages">0</strong> artworks
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    🕐 <strong id="lastUpdated">Just now</strong>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    ⚡ <strong>Live</strong>
                </div>
            </div>
        </header>

        <!-- CONTROLS -->
        <div class="controls">
            <div class="search-box">
                <span class="icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search artworks by prompt..." oninput="filterImages()">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">
                    <span>✦</span> All
                </button>
                <button class="filter-btn" data-filter="recent" onclick="setFilter('recent')">
                    <span>🕐</span> Recent
                </button>
                <button class="filter-btn" data-filter="oldest" onclick="setFilter('oldest')">
                    <span>📅</span> Oldest
                </button>
            </div>
        </div>

        <!-- GALLERY HEADER -->
        <div class="gallery-header">
            <h2>✦ Gallery</h2>
            <span class="count" id="imageCount">0 images</span>
        </div>

        <!-- LOADING -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Curating masterpieces...</p>
        </div>

        <!-- GALLERY -->
        <div class="gallery" id="gallery"></div>

        <!-- EMPTY -->
        <div class="empty" id="empty">
            <div class="icon">🎨</div>
            <h3>No artworks found</h3>
            <p>Try searching with different keywords</p>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-content">
            <div class="image-container">
                <img id="modalImage" src="" alt="Generated artwork">
            </div>
            <div class="details">
                <div class="prompt" id="modalPrompt"></div>
                <div class="meta-grid">
                    <div class="meta-item">
                        <label>🕐 Created</label>
                        <value id="modalTime"></value>
                    </div>
                    <div class="meta-item">
                        <label>📐 Resolution</label>
                        <value id="modalResolution">—</value>
                    </div>
                    <div class="meta-item">
                        <label>✨ Enhanced</label>
                        <value id="modalEnhanced">—</value>
                    </div>
                    <div class="meta-item">
                        <label>🎨 Styles</label>
                        <value id="modalStyles">—</value>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let allImages = [];

        async function loadImages() {
            document.getElementById('loading').classList.add('active');
            document.getElementById('gallery').innerHTML = '';
            document.getElementById('empty').style.display = 'none';

            try {
                const response = await fetch('/api/images');
                allImages = await response.json();
                renderImages();
            } catch (error) {
                console.error('Error loading images:', error);
                document.getElementById('gallery').innerHTML = `
                    <div class="empty" style="display:block;">
                        <div class="icon">⚠️</div>
                        <h3>Failed to load artworks</h3>
                        <p>Please refresh the page and try again</p>
                    </div>
                `;
            }

            document.getElementById('loading').classList.remove('active');
        }

        function renderImages() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            let filtered = allImages;

            // Apply search filter
            if (searchTerm) {
                filtered = filtered.filter(img => 
                    img.prompt.toLowerCase().includes(searchTerm)
                );
            }

            // Apply sort filter
            if (currentFilter === 'recent') {
                filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            } else if (currentFilter === 'oldest') {
                filtered.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            }

            // Update stats
            document.getElementById('totalImages').textContent = filtered.length;
            document.getElementById('imageCount').textContent = `${filtered.length} image${filtered.length !== 1 ? 's' : ''}`;
            
            if (filtered.length > 0) {
                const latest = filtered.reduce((a, b) => 
                    new Date(a.createdAt) > new Date(b.createdAt) ? a : b
                );
                document.getElementById('lastUpdated').textContent = formatTime(latest.createdAt);
            }

            // Render gallery
            const gallery = document.getElementById('gallery');
            if (filtered.length === 0) {
                document.getElementById('empty').style.display = 'block';
                gallery.innerHTML = '';
                return;
            }
            document.getElementById('empty').style.display = 'none';

            gallery.innerHTML = filtered.map((img, index) => {
                const styles = img.metadata?.styles || [];
                return `
                    <div class="image-card" style="animation-delay: ${(index % 12) * 0.05}s" onclick="openModal('${img.id}')">
                        <div class="image-wrapper">
                            <img src="${img.url}" alt="${img.prompt}" loading="lazy">
                            <div class="image-overlay">
                                <button class="view-btn" onclick="event.stopPropagation(); openModal('${img.id}')">
                                    ✦ View Artwork
                                </button>
                            </div>
                        </div>
                        <div class="info">
                            <div class="prompt">${img.prompt}</div>
                            <div class="meta">
                                <div class="tags">
                                    ${styles.slice(0, 2).map(style => 
                                        `<span class="tag">${style}</span>`
                                    ).join('')}
                                    ${styles.length > 2 ? `<span class="tag">+${styles.length - 2}</span>` : ''}
                                </div>
                                <div class="time">🕐 ${formatTime(img.createdAt)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterImages() {
            renderImages();
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            renderImages();
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = (now - date) / 1000;

            if (diff < 60) return 'Just now';
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
            
            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        }

        function openModal(id) {
            const img = allImages.find(i => i.id === id);
            if (!img) return;

            document.getElementById('modalImage').src = img.url;
            document.getElementById('modalPrompt').textContent = img.prompt;
            document.getElementById('modalTime').textContent = new Date(img.createdAt).toLocaleString('en-US', {
                month: 'long',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            document.getElementById('modalResolution').textContent = img.metadata?.resolution || '—';
            document.getElementById('modalEnhanced').textContent = img.metadata?.enhanced ? '✓ Yes' : '✗ No';
            document.getElementById('modalStyles').textContent = img.metadata?.styles?.join(', ') || '—';

            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'f' || e.key === 'F') {
                document.getElementById('searchInput').focus();
            }
        });

        // Close modal on backdrop click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal')) {
                closeModal();
            }
        });

        // Load images on page load
        loadImages();

        // Auto-refresh every 60 seconds
        setInterval(loadImages, 60000);

        // Focus search on Ctrl+/ or Cmd+/
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
    </script>
</body>
</html>
