<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ Art Gallery</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0a0f;--card:#12121a;--text:#f1f1f5;--sub:#a0a0b0;--muted:#606070;--accent:#7c6cf0;--border:rgba(255,255,255,0.06)}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:2rem;min-height:100vh}
        .container{max-width:1400px;margin:0 auto}
        header{display:flex;justify-content:space-between;align-items:center;padding:1rem 0 2rem;border-bottom:1px solid var(--border);margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
        .logo h1{font-size:2rem;background:linear-gradient(135deg,#f1f1f5,#a0a0b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .logo .subtitle{font-size:.85rem;color:var(--sub)}.logo .subtitle span{color:var(--accent)}
        .stats{display:flex;gap:2rem;padding:.5rem 1.5rem;background:rgba(255,255,255,0.03);border-radius:100px;border:1px solid var(--border)}
        .stats .item{font-size:.85rem;color:var(--sub)}.stats .item strong{color:var(--text)}
        .controls{display:flex;gap:1rem;flex-wrap:wrap;padding:1rem 1.5rem;background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:2rem}
        .search{flex:1;min-width:200px;position:relative}
        .search input{width:100%;padding:.8rem 1rem .8rem 3rem;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.95rem}
        .search input:focus{outline:none;border-color:var(--accent)}
        .search .icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--muted)}
        .filters{display:flex;gap:.5rem;flex-wrap:wrap}
        .filter{padding:.5rem 1.2rem;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:100px;color:var(--sub);cursor:pointer;transition:.3s;font-size:.8rem}
        .filter:hover{background:rgba(255,255,255,0.06);color:var(--text)}
        .filter.active{background:var(--accent);border-color:var(--accent);color:#fff}
        .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
        .card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border);transition:.3s;position:relative}
        .card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
        .card .image-wrap{position:relative;padding-top:100%;background:#0a0a0f;overflow:hidden}
        .card .image-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
        .card .info{padding:1rem}
        .card .prompt{font-size:.9rem;color:var(--text);margin-bottom:.5rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .card .meta{display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:var(--muted)}
        .card .tag{background:rgba(124,108,240,0.1);color:var(--accent);padding:.15rem .6rem;border-radius:100px;font-size:.65rem}
        .delete-btn{position:absolute;top:10px;right:10px;background:rgba(255,0,0,0.8);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;transition:.3s;z-index:10;display:flex;align-items:center;justify-content:center;opacity:0;backdrop-filter:blur(4px)}
        .card:hover .delete-btn{opacity:1}
        .delete-btn:hover{background:#ff0000;transform:scale(1.1)}
        .loading{text-align:center;padding:4rem;color:var(--muted)}
        .loading .spin{width:40px;height:40px;border:3px solid rgba(255,255,255,0.05);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty{text-align:center;padding:4rem;color:var(--muted)}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);z-index:1000;padding:2rem;align-items:center;justify-content:center}
        .modal.active{display:flex}
        .modal-content{max-width:800px;width:100%;background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border)}
        .modal-content .image-wrap{position:relative;padding-top:100%;background:#0a0a0f}
        .modal-content .image-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain}
        .modal-content .details{padding:1.5rem}
        .modal-close{position:fixed;top:2rem;right:2rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;width:3rem;height:3rem;border-radius:50%;font-size:1.5rem;cursor:pointer;z-index:1001}
        .modal-delete{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:rgba(255,0,0,0.9);border:none;color:#fff;padding:.8rem 2rem;border-radius:100px;font-size:1rem;cursor:pointer;transition:.3s;z-index:1001;font-weight:600}
        .modal-delete:hover{background:#ff0000;transform:translateX(-50%) scale(1.05)}
        @media(max-width:768px){body{padding:1rem}.stats{gap:1rem;padding:.5rem 1rem}.gallery{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}.delete-btn{opacity:1;width:28px;height:28px;font-size:14px}}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>✦ Art Gallery</h1>
                <div class="subtitle">AI Generated <span>Masterpieces</span></div>
            </div>
            <div class="stats">
                <div class="item">🖼️ <strong id="total">0</strong> artworks</div>
                <div class="item">🕐 <strong id="updated">Just now</strong></div>
            </div>
        </header>

        <div class="controls">
            <div class="search">
                <span class="icon">🔍</span>
                <input type="text" id="search" placeholder="Search artworks by prompt..." oninput="render()">
            </div>
            <div class="filters">
                <button class="filter active" data-filter="all" onclick="setFilter('all')">All</button>
                <button class="filter" data-filter="recent" onclick="setFilter('recent')">Recent</button>
                <button class="filter" data-filter="oldest" onclick="setFilter('oldest')">Oldest</button>
            </div>
        </div>

        <div class="loading" id="loading"><div class="spin"></div><p>Loading artworks...</p></div>
        <div class="gallery" id="gallery"></div>
        <div class="empty" id="empty" style="display:none;"><p>🎨 No artworks found</p></div>
    </div>

    <div class="modal" id="modal" onclick="closeModal()">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <button class="modal-delete" onclick="deleteArtwork()">🗑️ Delete Artwork</button>
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="image-wrap"><img id="modalImg" src=""></div>
            <div class="details">
                <div id="modalPrompt" style="font-size:1.1rem;margin-bottom:1rem;"></div>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.5rem;">
                    <div style="background:rgba(255,255,255,0.03);padding:.5rem;border-radius:8px;">
                        <div style="font-size:.65rem;color:var(--muted);">Created</div>
                        <div id="modalTime" style="font-size:.8rem;"></div>
                    </div>
                    <div style="background:rgba(255,255,255,0.03);padding:.5rem;border-radius:8px;">
                        <div style="font-size:.65rem;color:var(--muted);">Resolution</div>
                        <div id="modalRes" style="font-size:.8rem;"></div>
                    </div>
                    <div style="background:rgba(255,255,255,0.03);padding:.5rem;border-radius:8px;">
                        <div style="font-size:.65rem;color:var(--muted);">ID</div>
                        <div id="modalId" style="font-size:.7rem;word-break:break-all;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let images = [];
        let filter = 'all';
        let currentImageId = null;

        async function load() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('gallery').innerHTML = '';
            try {
                const res = await fetch('https://raw.githubusercontent.com/youenowes/image-gallery/main/images.json');
                if(res.ok) images = await res.json();
                else images = [];
            } catch(e) { images = []; }
            document.getElementById('loading').style.display = 'none';
            render();
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase().trim();
            let filtered = [...images];
            if(q) filtered = filtered.filter(i => i.prompt.toLowerCase().includes(q));
            if(filter === 'recent') filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
            else if(filter === 'oldest') filtered.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
            
            document.getElementById('total').textContent = filtered.length;
            const gallery = document.getElementById('gallery');
            const empty = document.getElementById('empty');
            
            if(filtered.length === 0) { empty.style.display = 'block'; gallery.innerHTML = ''; return; }
            empty.style.display = 'none';
            
            gallery.innerHTML = filtered.map(i => `
                <div class="card">
                    <div class="image-wrap">
                        <img src="${i.url}" loading="lazy" onclick="openModal('${i.id}')">
                        <button class="delete-btn" onclick="event.stopPropagation();deleteArtworkById('${i.id}')">✕</button>
                    </div>
                    <div class="info">
                        <div class="prompt" onclick="openModal('${i.id}')">${i.prompt}</div>
                        <div class="meta">
                            <span>${i.metadata?.styles?.slice(0,2).map(s => `<span class="tag">${s}</span>`).join('')}</span>
                            <span>${time(i.createdAt)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            if(filtered.length > 0) {
                const latest = filtered.reduce((a,b) => new Date(a.createdAt) > new Date(b.createdAt) ? a : b);
                document.getElementById('updated').textContent = time(latest.createdAt);
            }
        }

        function setFilter(f) { filter = f; document.querySelectorAll('.filter').forEach(b => b.classList.toggle('active', b.dataset.filter === f)); render(); }

        function time(t) {
            const d = new Date(t), n = new Date(), s = (n-d)/1000;
            if(s < 60) return 'Just now';
            if(s < 3600) return Math.floor(s/60)+'m ago';
            if(s < 86400) return Math.floor(s/3600)+'h ago';
            return d.toLocaleDateString();
        }

        function openModal(id) {
            const i = images.find(x => x.id === id);
            if(!i) return;
            currentImageId = id;
            document.getElementById('modalImg').src = i.url;
            document.getElementById('modalPrompt').textContent = i.prompt;
            document.getElementById('modalTime').textContent = new Date(i.createdAt).toLocaleString();
            document.getElementById('modalRes').textContent = i.metadata?.resolution || '—';
            document.getElementById('modalId').textContent = i.id;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
            currentImageId = null;
        }

        function deleteArtworkById(id) {
            if(!confirm('Are you sure you want to delete this artwork?')) return;
            images = images.filter(i => i.id !== id);
            render();
            // Save to localStorage or send to server
            localStorage.setItem('gallery_images', JSON.stringify(images));
            // Also update images.json (you'll need to implement server endpoint)
            fetch('/api/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id})
            }).catch(e => console.error('Delete failed:', e));
            if(document.getElementById('modal').classList.contains('active')) closeModal();
        }

        function deleteArtwork() {
            if(!currentImageId) return;
            deleteArtworkById(currentImageId);
        }

        // Load from localStorage if available
        const saved = localStorage.getItem('gallery_images');
        if(saved) {
            try {
                const parsed = JSON.parse(saved);
                if(parsed.length > 0) images = parsed;
            } catch(e) {}
        }

        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
